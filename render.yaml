services:
  - type: web
    name: fleet-maintenance-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-maintenance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_ORIGINS
        value: "http://127.0.0.1:5500,http://localhost:5500,https://frontend-equipamentos-six.vercel.app"

databases:
  - name: fleet-maintenance-db
    databaseName: fleet_maintenance
    user: fleet_maintenance_user